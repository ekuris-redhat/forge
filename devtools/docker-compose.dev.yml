version: "3.9"

# Developer observability stack — supplements the main docker-compose.yml
# when running the API server and worker locally on the host.
#
# Usage:
#   docker compose -f devtools/docker-compose.dev.yml up -d
#
# Then start services locally:
#   uv run uvicorn forge.main:app --reload --port 8000
#   uv run forge worker
#
# Prometheus dashboard: http://localhost:9092
# Grafana dashboards: http://localhost:3010 (admin / grafana)

services:
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro,z
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    # Allows the container to reach host-local processes via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3010}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-grafana}
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource,redis-datasource
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-9000}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-default}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-clickhouse}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse}
      - PROMETHEUS_HOST=prometheus
      - PROMETHEUS_PORT=9090
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro,z
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro,z
    depends_on:
      - prometheus
      - redis
    extra_hosts:
      - "host.containers.internal:host-gateway"

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
