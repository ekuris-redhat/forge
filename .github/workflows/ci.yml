name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Check style (ruff)
        run: uv run ruff check src/

      - name: Check formatting (ruff)
        run: uv run ruff format --check src/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run unit tests
        env:
          JIRA_BASE_URL: https://example.atlassian.net
          JIRA_API_TOKEN: dummy
          JIRA_USER_EMAIL: dummy@example.com
          GITHUB_TOKEN: dummy
        run: uv run pytest tests/unit/ -q

  container-build:
    name: Container Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build --tag forge-ci:${{ github.sha }} .

      - name: Verify application imports
        run: >-
          docker run --rm
          --env JIRA_BASE_URL=https://example.atlassian.net
          --env JIRA_API_TOKEN=dummy
          --env JIRA_USER_EMAIL=dummy@example.com
          --env GITHUB_TOKEN=dummy
          forge-ci:${{ github.sha }}
          python -c "import forge; from forge.main import app; assert app is not None"

      - name: Verify Forge CLI entry point
        run: docker run --rm forge-ci:${{ github.sha }} forge --help
