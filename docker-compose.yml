version: "3.9"

services:
  # Redis Stack for state persistence, message queue, and checkpoint indexing
  # Redis Stack includes RediSearch module required by langgraph-checkpoint-redis
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Forge webhook gateway (FastAPI)
  forge-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro,z
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'

  # Grafana dashboards for Forge observability
  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3010}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-grafana}
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource,redis-datasource
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-9000}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-default}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-clickhouse}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse}
      - PROMETHEUS_HOST=prometheus
      - PROMETHEUS_PORT=9090
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - grafana-data:/var/lib/grafana
      - ./devtools/grafana/provisioning:/etc/grafana/provisioning:ro,z
      - ./devtools/grafana/dashboards:/var/lib/grafana/dashboards:ro,z
    depends_on:
      - prometheus
      - redis
    extra_hosts:
      - "host.containers.internal:host-gateway"

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
